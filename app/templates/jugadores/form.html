{% extends 'base.html' %}
{% block title %}{{ 'Editar' if jugador else 'Nuevo' }} Jugador{% endblock %}
{% block page_title %}{{ 'Editar' if jugador else 'Nuevo' }} Jugador{% endblock %}
{% block content %}
<div style="max-width:580px;margin:0 auto">
<div class="card">
  <div class="card-header">
    <span class="card-title">👤 Datos del Jugador</span>
  </div>
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label class="form-label">Equipo *</label>
      <select name="equipo_id" class="form-control" required>
        <option value="">Selecciona un equipo</option>
        {% for e in equipos %}
        <option value="{{ e.id }}"
          {% if jugador and jugador.equipo_id == e.id %}selected
          {% elif equipo_id == e.id %}selected{% endif %}>
          {{ e.nombre }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-grid form-grid-2">
      <div class="form-group">
        <label class="form-label">Nombre *</label>
        <input type="text" name="nombre" class="form-control"
               value="{{ jugador.nombre if jugador else '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Apellido *</label>
        <input type="text" name="apellido" class="form-control"
               value="{{ jugador.apellido if jugador else '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">N° Camiseta</label>
        <input type="number" name="numero_camiseta" class="form-control"
               value="{{ jugador.numero_camiseta if jugador else '' }}"
               min="1" max="99" placeholder="1-99">
      </div>
      <div class="form-group">
        <label class="form-label">Posición</label>
        <select name="posicion" class="form-control">
          <option value="">Sin posición</option>
          {% for pos in ['Portero','Defensa','Mediocampista','Delantero'] %}
          <option value="{{ pos }}"
            {% if jugador and jugador.posicion == pos %}selected{% endif %}>{{ pos }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fecha de Nacimiento</label>
        <input type="date" name="fecha_nacimiento" class="form-control"
               value="{{ jugador.fecha_nacimiento if jugador else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label">Foto</label>
        <input type="file" name="foto" class="form-control" accept="image/*">
        {% if jugador and jugador.foto %}
        <div style="margin-top:.5rem">
          <img src="{{ url_for('static', filename=jugador.foto) }}"
               style="width:48px;height:48px;border-radius:50%;object-fit:cover">
        </div>
        {% endif %}
      </div>
    </div>
    <div class="flex-between mt-2">
      <a href="{{ url_for('equipos.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Cancelar
      </a>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> {{ 'Actualizar' if jugador else 'Registrar Jugador' }}
      </button>
    </div>
  </form>
</div>
</div>
{% endblock %}
