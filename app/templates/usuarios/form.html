{% extends 'base.html' %}
{% block title %}Nuevo Usuario{% endblock %}
{% block page_title %}Nuevo Usuario{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto">
<div class="card">
  <div class="card-header"><span class="card-title">👤 Datos del Usuario</span></div>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Usuario *</label>
      <input type="text" name="username" class="form-control" required placeholder="Ej: juanperez">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña *</label>
      <input type="password" name="password" class="form-control" required placeholder="Mínimo 6 caracteres">
    </div>
    <div class="form-group">
      <label class="form-label">Rol *</label>
      <select name="rol" class="form-control">
        <option value="delegado">Delegado (solo lectura)</option>
        <option value="arbitro">Árbitro (gestiona partidos)</option>
        <option value="admin">Admin (acceso total)</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre Completo</label>
      <input type="text" name="nombre_completo" class="form-control" placeholder="Nombre real">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com">
    </div>
    <div class="flex-between mt-2">
      <a href="{{ url_for('usuarios.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Cancelar
      </a>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> Crear Usuario
      </button>
    </div>
  </form>
</div>
</div>
{% endblock %}
