{% extends 'base.html' %}
{% block title %}Nuevo Partido{% endblock %}
{% block page_title %}Nuevo Partido{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto">
<div class="card">
  <div class="card-header"><span class="card-title">⚽ Datos del Partido</span></div>
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Torneo *</label>
      <select name="torneo_id" class="form-control" required>
        <option value="">Selecciona torneo</option>
        {% for t in torneos %}
        <option value="{{ t.id }}">{{ t.nombre }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-grid form-grid-2">
      <div class="form-group">
        <label class="form-label">Equipo Local *</label>
        <select name="equipo_local_id" class="form-control" required>
          <option value="">Seleccionar...</option>
          {% for e in equipos %}
          <option value="{{ e.id }}">{{ e.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Equipo Visitante *</label>
        <select name="equipo_visitante_id" class="form-control" required>
          <option value="">Seleccionar...</option>
          {% for e in equipos %}
          <option value="{{ e.id }}">{{ e.nombre }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Árbitro</label>
        <select name="arbitro_id" class="form-control">
          <option value="">Sin árbitro</option>
          {% for a in arbitros %}
          <option value="{{ a.id }}">{{ a.nombre }} {{ a.apellido }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Cancha</label>
        <input type="text" name="cancha" class="form-control" placeholder="Ej: Cancha Central">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Fecha y Hora</label>
        <input type="datetime-local" name="fecha" class="form-control">
      </div>
    </div>
    <div class="flex-between mt-2">
      <a href="{{ url_for('partidos.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Cancelar
      </a>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> Crear Partido
      </button>
    </div>
  </form>
</div>
</div>
{% endblock %}
