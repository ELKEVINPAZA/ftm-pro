{% extends 'base.html' %}
{% block title %}Nuevo Árbitro{% endblock %}
{% block page_title %}Nuevo Árbitro{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto">
<div class="card">
  <div class="card-header"><span class="card-title">🟨 Datos del Árbitro</span></div>
  <form method="POST">
    <div class="form-grid form-grid-2">
      <div class="form-group">
        <label class="form-label">Nombre *</label>
        <input type="text" name="nombre" class="form-control" required placeholder="Nombre">
      </div>
      <div class="form-group">
        <label class="form-label">Apellido *</label>
        <input type="text" name="apellido" class="form-control" required placeholder="Apellido">
      </div>
      <div class="form-group">
        <label class="form-label">N° Licencia</label>
        <input type="text" name="licencia" class="form-control" placeholder="Opcional">
      </div>
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input type="text" name="telefono" class="form-control" placeholder="Opcional">
      </div>
    </div>
    <div class="flex-between mt-2">
      <a href="{{ url_for('arbitros.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Cancelar
      </a>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> Registrar Árbitro
      </button>
    </div>
  </form>
</div>
</div>
{% endblock %}
