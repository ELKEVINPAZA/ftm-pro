{% extends 'base.html' %}
{% block title %}{{ 'Editar' if equipo else 'Nuevo' }} Equipo{% endblock %}
{% block page_title %}{{ 'Editar' if equipo else 'Nuevo' }} Equipo{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto">
<div class="card">
  <div class="card-header">
    <span class="card-title">🛡️ Datos del Equipo</span>
  </div>
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label class="form-label">Torneo</label>
      <select name="torneo_id" class="form-control">
        <option value="">Sin torneo</option>
        {% for t in torneos %}
        <option value="{{ t.id }}"
          {% if equipo and equipo.torneo_id == t.id %}selected
          {% elif request.args.get('torneo_id')|int == t.id %}selected{% endif %}>
          {{ t.nombre }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="form-grid form-grid-2">
      <div class="form-group" style="grid-column:1/-1">
        <label class="form-label">Nombre del Equipo *</label>
        <input type="text" name="nombre" class="form-control"
               value="{{ equipo.nombre if equipo else '' }}" required
               placeholder="Ej: Atlético Ciudad">
      </div>
      <div class="form-group">
        <label class="form-label">Entrenador</label>
        <input type="text" name="entrenador" class="form-control"
               value="{{ equipo.entrenador if equipo else '' }}"
               placeholder="Nombre del DT">
      </div>
      <div class="form-group">
        <label class="form-label">Ciudad / Barrio</label>
        <input type="text" name="ciudad" class="form-control"
               value="{{ equipo.ciudad if equipo else '' }}"
               placeholder="Ciudad o barrio">
      </div>
      <div class="form-group">
        <label class="form-label">Contacto</label>
        <input type="text" name="contacto" class="form-control"
               value="{{ equipo.contacto if equipo else '' }}"
               placeholder="Teléfono o email">
      </div>
      <div class="form-group">
        <label class="form-label">Escudo / Logo</label>
        <input type="file" name="escudo" class="form-control" accept="image/*">
        {% if equipo and equipo.escudo %}
        <div style="margin-top:.5rem">
          <img src="{{ url_for('static', filename=equipo.escudo) }}"
               style="width:48px;height:48px;border-radius:50%;object-fit:cover">
        </div>
        {% endif %}
      </div>
    </div>
    <div class="form-grid form-grid-2">
      <div class="form-group">
        <label class="form-label">Mín. Jugadores</label>
        <input type="number" name="min_jugadores" class="form-control"
               value="{{ equipo.min_jugadores if equipo else 11 }}" min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Máx. Jugadores</label>
        <input type="number" name="max_jugadores" class="form-control"
               value="{{ equipo.max_jugadores if equipo else 25 }}" min="1">
      </div>
    </div>
    <div class="flex-between mt-2">
      <a href="{{ url_for('equipos.index') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Cancelar
      </a>
      <button type="submit" class="btn btn-primary">
        <i class="fas fa-save"></i> {{ 'Actualizar' if equipo else 'Registrar Equipo' }}
      </button>
    </div>
  </form>
</div>
</div>
{% endblock %}
