<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FTM Pro · Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --accent: #00e676; --accent2: #1de9b6;
  --bg: #0a0c10; --card: #111520;
  --text: #e8eaf6; --muted: #8892a4;
  --border: rgba(255,255,255,0.08);
  --font-head: 'Syne',sans-serif; --font: 'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.bg-field {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,230,118,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(29,233,182,0.05) 0%, transparent 60%);
}
.field-lines {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 50px 50px;
}
.login-wrap {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 420px;
  padding: 1rem;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}
.login-logo {
  text-align: center;
  margin-bottom: 2rem;
}
.login-logo .ball {
  font-size: 3rem;
  display: block;
  margin-bottom: .5rem;
  animation: spin 8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.login-logo h1 {
  font-family: var(--font-head);
  font-size: 1.8rem;
  font-weight: 800;
}
.login-logo h1 span { color: var(--accent); }
.login-logo p { font-size: .85rem; color: var(--muted); margin-top: .3rem; }

.form-group { margin-bottom: 1.25rem; }
.form-label {
  display: block;
  font-size: .75rem;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .4rem;
}
.input-wrap { position: relative; }
.input-icon {
  position: absolute;
  left: 1rem; top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: .9rem;
}
.form-control {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  padding: .75rem 1rem .75rem 2.75rem;
  font-family: var(--font);
  font-size: .95rem;
  outline: none;
  transition: all .2s;
}
.form-control:focus {
  border-color: var(--accent);
  background: rgba(0,230,118,0.04);
  box-shadow: 0 0 0 3px rgba(0,230,118,0.1);
}
.btn-login {
  width: 100%;
  padding: .85rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #000;
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: all .2s;
  margin-top: .5rem;
}
.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,230,118,0.3); }
.alert {
  background: rgba(255,23,68,0.1);
  border: 1px solid rgba(255,23,68,0.2);
  color: #ff6090;
  padding: .75rem 1rem;
  border-radius: 10px;
  font-size: .875rem;
  margin-bottom: 1.25rem;
  display: flex; align-items: center; gap: .6rem;
}
.demo-info {
  margin-top: 1.5rem;
  padding: 1rem;
  background: rgba(0,230,118,0.06);
  border: 1px solid rgba(0,230,118,0.12);
  border-radius: 10px;
  font-size: .8rem;
  color: var(--muted);
}
.demo-info strong { color: var(--accent); }
</style>
</head>
<body>
<div class="bg-field"></div>
<div class="field-lines"></div>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="ball">⚽</span>
      <h1>FTM <span>Pro</span></h1>
      <p>Football Tournament Manager</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" name="username" class="form-control"
                 placeholder="Ingresa tu usuario" required autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" class="form-control"
                 placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i> Ingresar
      </button>
    </form>

    <div class="demo-info">
        <i class="fas fa-info-circle"></i>
        Ingresa con tus credenciales de acceso.
    </div>
  </div>
</div>
</body>
</html>
